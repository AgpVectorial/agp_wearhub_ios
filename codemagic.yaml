# Build iOS in the cloud (Mac) — free tier: https://codemagic.io
# 1. Create account → Add app → Upload this folder or connect Git
# 2. Codemagic detects codemagic.yaml automatically
# 3. For install on iPhone: add Apple Developer signing in Codemagic UI
#    (Team settings → Code signing → Apple Developer Portal)

workflows:
  agp-wear-hub-ios:
    name: AGP Wear Hub iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.agptech.agpWearHub

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Build iOS app
        script: |
          flutter pub get
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log

  agp-wear-hub-ios-ipa:
    name: AGP Wear Hub iOS (IPA — needs signing)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development
        bundle_identifier: com.agptech.agpWearHub

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Build IPA
        script: |
          flutter pub get
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

  agp-wear-hub-android:
    name: AGP Wear Hub Android
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Build APK
        script: |
          flutter pub get
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
